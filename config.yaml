# 处理器配置
handler:
  # 处理器类型：console（控制台输出）或 http（HTTP上报）
  type: http
  # HTTP上报接口地址（当type为http时必需）
  api_url: http://localhost:8080/api/v1/logs
  # HTTP请求超时时间（可选，默认：10s，单位：s、m、h）
  timeout: 1s

# 指标统计配置
metrics:
  # 是否启用指标统计（默认：true）
  enabled: true
  # 统计间隔（可选，默认：1m，单位：s、m、h）
  # 指标会按此间隔定时统计和上报，时间戳会对齐到最近的间隔
  interval: 1m
  # 指标上报API地址（可选，如果配置则会将指标统计数据上报到HTTP接口）
  # 指标会按标签维度分组上报，格式参考 falcon-log-agent
  api_url: http://localhost:8080/api/v1/metrics
  # HTTP请求超时时间（可选，默认：10s）
  timeout: 1s

rules:
  # 错误日志规则（上报完整日志）
  - name: "错误日志"
    pattern: "ERROR|FATAL|CRITICAL|Exception"
    description: "匹配包含错误、致命错误、严重错误或异常的日志"
    log_file: /Users/liqiang/work/yunlaba/falcon-log-agent/access.log # 监控指定的日志文件
    tag: error # 标签，会在打印和上报时带上
    metrics_enable: true # 启用指标统计
    report_mode: full # 上报完整日志（默认值）

  # 警告日志规则（上报完整日志）
  - name: "警告日志"
    pattern: "WARN|WARNING"
    description: "匹配包含警告信息的日志"
    log_file: /Users/liqiang/work/yunlaba/falcon-log-agent/access.log # 监控指定的日志文件
    tag: warning # 标签
    metrics_enable: true # 启用指标统计
    report_mode: full # 上报完整日志
