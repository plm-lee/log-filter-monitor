# log-filter-monitor 默认配置（Docker 安装模板）
# 配置文件位置：~/.log-agent/config.yaml
# 请根据实际情况修改 api_url 和 log_file 路径

handler:
  # 处理器类型：tcp（默认，长连接可靠+高性能）| console | http | udp
  type: tcp
  # type=tcp 时使用（默认）：
  tcp_addr: "host.docker.internal:8890"
  tcp_batch_size: 200
  tcp_flush_interval: 200ms
  # type=http 时使用：
  # api_url: http://host.docker.internal:8080/api/v1/logs
  # batch_size: 100
  # batch_interval: 1s
  # type=udp 时使用：
  # udp_addr: "host.docker.internal:8889"

# 断点续传（仅 HTTP 批量模式有效，ACK 后保存偏移，重启从断点继续）
# checkpoint:
#   enabled: true
#   path: ""  # 默认 ~/.log-agent/checkpoint.json

# 配置拉取（从 Manager 定时拉取并热更新规则）
# config_pull:
#   enabled: true
#   url: http://host.docker.internal:8080/log/manager/api/v1/agent/config
#   interval: 30s
#   agent_id: default
#   api_key: ""  # 与 Manager api_key 一致时做认证

metrics:
  enabled: true
  interval: 1m
  api_url: http://host.docker.internal:8080/api/v1/metrics
  timeout: 10s

# log_file 路径说明：容器内路径需对应挂载的宿主机目录
# - /var/log/xxx 对应宿主机 /var/log（默认挂载）
# - /etc/log-agent/logs/xxx 对应宿主机 ~/.log-agent/logs（默认挂载）
rules:
  - name: "错误日志"
    pattern: "ERROR|FATAL|CRITICAL|Exception"
    description: "匹配包含错误、致命错误、严重错误或异常的日志"
    log_file: /etc/log-agent/logs/app.log
    tag: error
    metrics_enable: true
    report_mode: full

  - name: "警告日志"
    pattern: "WARN|WARNING"
    description: "匹配包含警告信息的日志"
    log_file: /etc/log-agent/logs/app.log
    tag: warning
    metrics_enable: true
    report_mode: full
